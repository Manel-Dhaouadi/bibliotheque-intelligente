{% extends 'base.html' %}
{% block title %}Ajouter une catégorie - Bibliothèque IA{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">➕ Ajouter une catégorie</h1>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Nom de la catégorie *</label>
                <input type="text" name="nom" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       placeholder="Ex: Roman, Science, Histoire...">
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Description (optionnel)</label>
                <textarea name="description" rows="3"
                          class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                          placeholder="Description de la catégorie..."></textarea>
            </div>
            
            <div class="flex gap-3">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">Enregistrer</button>
                <a href="{% url 'liste_categories' %}" class="bg-gray-300 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-400 transition">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
