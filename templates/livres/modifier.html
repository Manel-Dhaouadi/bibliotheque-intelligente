{% extends 'base.html' %}
{% block title %}Modifier un livre - Bibliothèque IA{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6">✏️ Modifier le livre</h1>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Titre *</label>
                <input type="text" name="titre" value="{{ livre.titre }}" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Auteur *</label>
                <input type="text" name="auteur" value="{{ livre.auteur }}" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Catégorie</label>
                <select name="categorie" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                    <option value="">-- Sélectionner une catégorie --</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if livre.categorie.id == cat.id %}selected{% endif %}>{{ cat.nom }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-gray-700 mb-2">Année de publication</label>
                    <input type="number" name="annee_publication" value="{{ livre.annee_publication|default:'' }}" 
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                           min="1450" max="2025">
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">Quantité totale</label>
                    <input type="number" name="quantite_totale" value="{{ livre.quantite_totale }}" required 
                           class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                           min="1">
                </div>
            </div>
            
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Quantité disponible</label>
                <input type="number" name="quantite_disponible" value="{{ livre.quantite_disponible }}" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500"
                       min="0" max="{{ livre.quantite_totale }}">
            </div>
            
            <div class="flex gap-3">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">Mettre à jour</button>
                <a href="{% url 'liste_livres' %}" class="bg-gray-300 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-400 transition">Annuler</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
