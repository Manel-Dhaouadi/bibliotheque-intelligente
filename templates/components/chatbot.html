<style>
    .chatbot-btn {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        border-radius: 30px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        border: none;
        cursor: pointer;
        font-size: 28px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        transition: all 0.3s;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .chatbot-btn:hover {
        transform: scale(1.05);
        background: linear-gradient(135deg, #4f46e5, #7c3aed);
    }
    .chatbot-window {
        position: fixed;
        bottom: 90px;
        right: 20px;
        width: 380px;
        height: 500px;
        background: white;
        border-radius: 15px;
        box-shadow: 0 5px 25px rgba(0,0,0,0.2);
        display: none;
        flex-direction: column;
        z-index: 1000;
        overflow: hidden;
    }
    .chatbot-window.open {
        display: flex;
    }
    .chatbot-header {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .chatbot-messages {
        flex: 1;
        overflow-y: auto;
        padding: 15px;
        background: #f8f9fa;
    }
    .message {
        margin-bottom: 10px;
        display: flex;
    }
    .message.user {
        justify-content: flex-end;
    }
    .message.bot {
        justify-content: flex-start;
    }
    .message-content {
        max-width: 80%;
        padding: 8px 12px;
        border-radius: 15px;
        font-size: 14px;
    }
    .message.user .message-content {
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
    }
    .message.bot .message-content {
        background: white;
        border: 1px solid #ddd;
        color: #333;
    }
    .chatbot-input {
        display: flex;
        padding: 10px;
        border-top: 1px solid #ddd;
        background: white;
    }
    .chatbot-input input {
        flex: 1;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 20px;
        outline: none;
    }
    .chatbot-input button {
        margin-left: 8px;
        padding: 8px 16px;
        background: linear-gradient(135deg, #6366f1, #8b5cf6);
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
    }
    .loading {
        text-align: center;
        padding: 10px;
        color: #6366f1;
    }
    @media (max-width: 480px) {
        .chatbot-window {
            width: calc(100vw - 40px);
            right: 20px;
            left: 20px;
        }
    }
</style>

<button class="chatbot-btn" onclick="toggleChatbot()">✨</button>

<div id="chatbotWindow" class="chatbot-window">
    <div class="chatbot-header">
        <span>🤖 Assistant IA</span>
        <button onclick="toggleChatbot()" style="background:none; border:none; color:white; cursor:pointer;">✕</button>
    </div>
    <div id="chatMessages" class="chatbot-messages">
        <div class="message bot">
            <div class="message-content">👋 Bonjour ! Je suis votre assistant IA. Posez-moi vos questions sur les livres !</div>
        </div>
    </div>
    <div class="chatbot-input">
        <input type="text" id="chatInput" placeholder="Posez votre question..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button onclick="sendMessage()">Envoyer</button>
    </div>
</div>
