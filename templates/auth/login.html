{% extends 'base.html' %}
{% block title %}Connexion - Bibliothèque IA{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">📚</div>
            <h1 class="text-2xl font-bold text-gray-800">Connexion</h1>
            <p class="text-gray-500">Connectez-vous avec votre email</p>
        </div>

        <form method="POST" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Email</label>
                <input type="email" name="email" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Mot de passe</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">
                Se connecter
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{% url 'register' %}" class="text-indigo-600 hover:text-indigo-800">Pas de compte ? Inscrivez-vous</a>
        </div>
    </div>
</div>
{% endblock %}
