{% extends 'base.html' %}
{% block title %}Inscription - Bibliothèque IA{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-2xl shadow-xl p-8">
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">📚</div>
            <h1 class="text-2xl font-bold text-gray-800">Inscription</h1>
            <p class="text-gray-500">Créez votre compte gratuitement</p>
        </div>

        <form method="POST" action="{% url 'register' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Nom d'utilisateur *</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Email *</label>
                <input type="email" name="email" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="mb-4">
                <label class="block text-gray-700 mb-2">Mot de passe *</label>
                <input type="password" name="password1" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <p class="text-gray-400 text-xs mt-1">Minimum 6 caractères</p>
            </div>
            <div class="mb-6">
                <label class="block text-gray-700 mb-2">Confirmer le mot de passe *</label>
                <input type="password" name="password2" required 
                       class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition">
                S'inscrire
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{% url 'login' %}" class="text-indigo-600 hover:text-indigo-800">Déjà un compte ? Connectez-vous</a>
        </div>
    </div>
</div>
{% endblock %}
