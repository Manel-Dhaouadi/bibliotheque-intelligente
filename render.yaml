services:
  - type: web
    name: bibliotheque-ia
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn bibliotheque.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: bibliotheque.settings
      - key: PYTHON_VERSION
        value: 3.10.13
      - key: DATABASE_URL
        fromDatabase:
          name: bibliotheque-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        value: AIzaSyDFd0SMgerKN3GxPnjarnVNXeV6rCxJzBc
      - key: DEBUG
        value: "False"

databases:
  - name: bibliotheque-db
    plan: free
    databaseName: bibliotheque_db
    user: bibliotheque_user